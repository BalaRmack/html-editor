<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Мой HTML редактор</title>
<style>
  :root {
    --bg: #0f1220;
    --panel: #14182a;
    --panel-2: #0f1323;
    --muted: #9fb0d0;
    --text: #e8ecff;
    --accent: #6da8ff;
    --border: #263055;
  }
  [data-theme="light"]{
    --bg: #f4f7ff;
    --panel: #ffffff;
    --panel-2: #f0f3ff;
    --muted: #55627a;
    --text: #101426;
    --accent: #2f6cf6;
    --border: #d9e0ff;
  }
  html,body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 10px;
  }
  header, footer {
    padding: 10px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .brand { font-weight: 800; letter-spacing: .2px; margin-right: 10px; }
  button, .btn {
    appearance: none;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
  }
  button:hover { filter: brightness(1.06); }
  .ghost { background: transparent; }
  .split {
    display: grid;
    gap: 10px;
    grid-template-columns: 1fr 1fr;
    padding: 0 10px 10px;
    min-height: 0; /* чтобы высота распределялась */
  }
  .col {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 0;
  }
  .tabs {
    display: flex; gap: 6px; padding: 8px; border-bottom: 1px solid var(--border);
  }
  .tab {
    padding: 6px 10px; border-radius: 8px; cursor: pointer;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    font-weight: 700;
  }
  .tab.active { color: var(--text); background: rgba(109,168,255,.12); border-color: #385aa7; }
  .editors { position: relative; min-height: 0; }
  .editor {
    position: absolute; inset: 0;
    margin: 0; padding: 10px 12px;
    width: 100%; height: 100%;
    resize: none; outline: none; border: none;
    background: transparent; color: var(--text);
    font: 13px/1.4 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    tab-size: 2;
    white-space: pre;
    overflow: auto;
  }
  .editor.hidden { display: none; }
  .toolbar { display: flex; gap: 8px; align-items: center; }
  .toolbar .sep { width: 1px; height: 28px; background: var(--border); }
  iframe {
    width: 100%; height: 100%; border: 0; background: white; border-radius: 0 0 12px 12px;
  }
  .panel-title { padding: 8px; font-weight: 800; border-bottom: 1px solid var(--border); }
  footer {
    display: flex; gap: 12px; align-items: center; justify-content: space-between;
    border-top: 1px solid var(--border);
  }
  .muted { color: var(--muted); }
  @media (max-width: 960px) {
    .split { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <header>
    <div class="brand">🧰 HTML Editor</div>
    <div class="toolbar">
      <button id="btn-new" title="Новый (очистить)">Новый</button>
      <label class="btn" for="file-open" title="Открыть .html">Открыть</label>
      <input id="file-open" type="file" accept=".html,.htm" hidden>
      <button id="btn-download" title="Скачать как .html">Скачать</button>
      <span class="sep"></span>
      <label class="btn">
        <input id="chk-live" type="checkbox" checked style="vertical-align: middle; margin-right: 6px;">
        Live предпросмотр
      </label>
      <button id="btn-run" class="ghost" title="Обновить предпросмотр">Обновить</button>
      <span class="sep"></span>
      <button id="btn-theme" title="Тема">Тема</button>
      <button id="btn-clear" class="ghost" title="Сбросить автосохранение">Сброс LS</button>
    </div>
  </header>

  <main class="split">
    <section class="col">
      <div class="tabs">
        <div class="tab active" data-tab="html">HTML</div>
        <div class="tab" data-tab="css">CSS</div>
        <div class="tab" data-tab="js">JS</div>
      </div>
      <div class="editors">
        <textarea id="ed-html" class="editor"></textarea>
        <textarea id="ed-css"  class="editor hidden"></textarea>
        <textarea id="ed-js"   class="editor hidden"></textarea>
      </div>
    </section>

    <section class="col">
      <div class="panel-title">Предпросмотр</div>
      <iframe id="preview" sandbox="allow-scripts allow-forms allow-pointer-lock allow-popups allow-modals allow-same-origin"></iframe>
    </section>
  </main>

  <footer>
    <div class="muted">Автосохранение: localStorage. В браузере — без сервера.</div>
    <div class="muted" id="status"></div>
  </footer>

<script>
(() => {
  const els = {
    html: document.getElementById('ed-html'),
    css:  document.getElementById('ed-css'),
    js:   document.getElementById('ed-js'),
    tabs: document.querySelectorAll('.tab'),
    iframe: document.getElementById('preview'),
    live: document.getElementById('chk-live'),
    run: document.getElementById('btn-run'),
    theme: document.getElementById('btn-theme'),
    clear: document.getElementById('btn-clear'),
    open: document.getElementById('file-open'),
    download: document.getElementById('btn-download'),
    create: document.getElementById('btn-new'),
    status: document.getElementById('status'),
  };

  const STORAGE_KEY = 'my-html-editor-v1';
  const THEME_KEY = 'my-html-editor-theme';

  // Начальное содержимое
  const defaults = {
    html: `<!-- Привет! Пиши HTML здесь -->
<h1>Здравствуйте 👋</h1>
<p>Это мой мини-редактор на GitHub Pages.</p>
<button onclick="alert('Работает!')">Кнопка</button>`,
    css: `/* Стили сюда */
body { font-family: system-ui, sans-serif; padding: 24px; }
h1 { color: #2f6cf6; }`,
    js: `// JS здесь
console.log('Привет из редактора!');`
  };

  // Тема
  function setTheme(mode) {
    document.documentElement.setAttribute('data-theme', mode);
    localStorage.setItem(THEME_KEY, mode);
  }
  const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
  setTheme(savedTheme);
  els.theme.textContent = savedTheme === 'dark' ? 'Светлая' : 'Тёмная';
  els.theme.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = cur === 'dark' ? 'light' : 'dark';
    setTheme(next);
    els.theme.textContent = next === 'dark' ? 'Светлая' : 'Тёмная';
  });

  // Вкладки
  els.tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      els.tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const k = tab.dataset.tab;
      document.querySelectorAll('.editor').forEach(ed => ed.classList.add('hidden'));
      document.getElementById('ed-' + k).classList.remove('hidden');
      document.getElementById('ed-' + k).focus();
    });
  });

  // Автосохранение
  function saveLS() {
    const payload = {
      html: els.html.value,
      css: els.css.value,
      js: els.js.value,
      ts: Date.now(),
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
    setStatus('Сохранено');
  }
  function loadLS() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) throw 0;
      const v = JSON.parse(raw);
      if (typeof v.html !== 'string') throw 0;
      els.html.value = v.html;
      els.css.value = v.css || '';
      els.js.value = v.js || '';
      return true;
    } catch { return false; }
  }

  // Статус
  let statusTimer = 0;
  function setStatus(text) {
    els.status.textContent = text;
    clearTimeout(statusTimer);
    statusTimer = setTimeout(() => els.status.textContent = '', 1400);
  }

  // Предпросмотр
  function buildDoc() {
    const html = els.html.value;
    const css = els.css.value;
    const js = (els.js.value || '').replaceAll('</script>', '<\\/script>');
    const doc = `<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview</title>
<style>${css}</style>
</head>
<body>
${html}
<script>${js}<\/script>
</body>
</html>`;
    return doc;
  }
  function render() {
    els.iframe.srcdoc = buildDoc();
    setStatus(els.live.checked ? 'Live обновлён' : 'Обновлено');
  }
  function debounce(fn, ms=300) {
    let t; return (...args) => { clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
  }
  const onChange = debounce(() => {
    saveLS();
    if (els.live.checked) render();
  }, 280);

  [els.html, els.css, els.js].forEach(ed => {
    ed.addEventListener('input', onChange);
  });
  els.run.addEventListener('click', () => render());

  // Файл: открыть
  els.open.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const text = await file.text();
    try {
      // Пытаемся распарсить HTML и разложить по вкладкам
      const dom = new DOMParser().parseFromString(text, 'text/html');
      const styles = [...dom.querySelectorAll('style')].map(s => s.textContent).join('\n');
      const scripts = [...dom.querySelectorAll('script:not([src])')].map(s => s.textContent).join('\n');
      els.html.value = dom.body.innerHTML.trim() || text;
      els.css.value = styles;
      els.js.value = scripts;
    } catch {
      els.html.value = text;
    }
    saveLS();
    render();
    e.target.value = '';
  });

  // Скачать
  els.download.addEventListener('click', () => {
    const blob = new Blob([buildDoc()], { type: 'text/html;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'index.html';
    document.body.appendChild(a);
    a.click();
    a.remove();
    setStatus('Скачано');
  });

  // Новый
  els.create.addEventListener('click', () => {
    if (!confirm('Очистить редактор?')) return;
    els.html.value = defaults.html;
    els.css.value = defaults.css;
    els.js.value = defaults.js;
    saveLS();
    render();
  });

  // Сброс LS
  els.clear.addEventListener('click', () => {
    localStorage.removeItem(STORAGE_KEY);
    setStatus('localStorage очищен');
  });

  // Инициализация
  if (!loadLS()) {
    els.html.value = defaults.html;
    els.css.value  = defaults.css;
    els.js.value   = defaults.js;
  }
  render();
})();
</script>
</body>
</html>
