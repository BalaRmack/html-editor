<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Мой HTML редактор</title>
<style>
  :root {
    --bg: #0a0e1a;
    --panel: #121728;
    --panel-2: #0d1120;
    --muted: #8895b8;
    --text: #eef2ff;
    --accent: #6da8ff;
    --accent-hover: #8dbbff;
    --border: #1f2a4a;
    --shadow: rgba(0, 0, 0, 0.4);
    --glow: rgba(109, 168, 255, 0.15);
    --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }
  [data-theme="light"]{
    --bg: #f0f4ff;
    --panel: #ffffff;
    --panel-2: #f5f8ff;
    --muted: #64748b;
    --text: #0f1420;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --border: #dbe4ff;
    --shadow: rgba(0, 0, 0, 0.08);
    --glow: rgba(59, 130, 246, 0.1);
  }
  * { box-sizing: border-box; }
  html,body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 12px;
    overflow: hidden;
  }
  header, footer {
    padding: 12px 16px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(8px);
  }
  footer {
    border-top: 1px solid var(--border);
    border-bottom: none;
  }
  header { 
    display: flex; 
    gap: 12px; 
    align-items: center; 
    flex-wrap: wrap;
    box-shadow: 0 2px 8px var(--shadow);
    z-index: 10;
  }
  .brand { 
    font-weight: 800; 
    letter-spacing: 0.3px; 
    margin-right: 12px;
    font-size: 18px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  button, .btn {
    appearance: none;
    border: 1px solid var(--border);
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    color: var(--text);
    padding: 8px 14px;
    border-radius: 10px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all var(--transition);
    position: relative;
    overflow: hidden;
  }
  button::before, .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.06), transparent);
    opacity: 0;
    transition: opacity var(--transition);
  }
  button:hover, .btn:hover { 
    filter: brightness(1.08);
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px var(--shadow), 0 0 20px var(--glow);
  }
  button:hover::before, .btn:hover::before {
    opacity: 1;
  }
  button:active, .btn:active {
    transform: translateY(0);
  }
  .ghost { 
    background: transparent;
    border-color: transparent;
  }
  .ghost:hover {
    background: var(--panel-2);
    border-color: var(--border);
  }
  .split {
    display: grid;
    gap: 12px;
    grid-template-columns: 1fr 1fr;
    padding: 0 12px 12px;
    min-height: 0;
  }
  .col {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: grid;
    grid-template-rows: auto 1fr;
    min-height: 0;
    overflow: hidden;
    box-shadow: 0 4px 16px var(--shadow);
    transition: box-shadow var(--transition);
  }
  .col:focus-within {
    box-shadow: 0 4px 20px var(--shadow), 0 0 30px var(--glow);
  }
  .tabs {
    display: flex; 
    gap: 6px; 
    padding: 10px; 
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
  }
  .tab {
    padding: 7px 14px; 
    border-radius: 9px; 
    cursor: pointer;
    background: transparent; 
    border: 1px solid transparent;
    color: var(--muted);
    font-weight: 600;
    font-size: 13px;
    transition: all var(--transition);
    position: relative;
  }
  .tab::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    width: 0;
    height: 2px;
    background: var(--accent);
    transition: all var(--transition);
    transform: translateX(-50%);
  }
  .tab:hover { 
    color: var(--text);
    background: rgba(109,168,255,0.06);
  }
  .tab.active { 
    color: var(--accent); 
    background: rgba(109,168,255,0.1);
    border-color: rgba(109,168,255,0.3);
  }
  .tab.active::after {
    width: 60%;
    bottom: -11px;
  }
  .editors { 
    position: relative; 
    min-height: 0; 
    background: var(--panel);
  }
  .editor {
    position: absolute; 
    inset: 0;
    margin: 0; 
    padding: 14px 16px;
    width: 100%; 
    height: 100%;
    resize: none; 
    outline: none; 
    border: none;
    background: transparent; 
    color: var(--text);
    font: 13px/1.5 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    tab-size: 2;
    white-space: pre;
    overflow: auto;
    scroll-behavior: smooth;
    opacity: 0;
    animation: fadeIn 0.25s ease forwards;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .editor.hidden { 
    display: none; 
    opacity: 0;
  }
  .toolbar { 
    display: flex; 
    gap: 8px; 
    align-items: center;
    flex-wrap: wrap;
  }
  .toolbar .sep { 
    width: 1px; 
    height: 24px; 
    background: var(--border);
    margin: 0 4px;
  }
  iframe {
    width: 100%; 
    height: 100%; 
    border: 0; 
    background: white; 
    border-radius: 0 0 12px 12px;
  }
  .panel-title { 
    padding: 10px 14px; 
    font-weight: 700; 
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
  }
  footer {
    display: flex; 
    gap: 12px; 
    align-items: center; 
    justify-content: space-between;
    font-size: 12px;
  }
  .muted { 
    color: var(--muted);
    transition: opacity var(--transition);
  }
  #status {
    font-weight: 600;
    color: var(--accent);
  }
  /* Scrollbar styling */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: var(--panel-2);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 4px;
    transition: background var(--transition);
  }
  ::-webkit-scrollbar-thumb:hover {
    background: var(--muted);
  }
  /* Checkbox styling */
  input[type="checkbox"] {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
    cursor: pointer;
  }
  @media (max-width: 960px) {
    .split { 
      grid-template-columns: 1fr; 
      grid-template-rows: 1fr 1fr;
    }
    body {
      gap: 8px;
    }
    header, footer {
      padding: 10px 12px;
    }
  }
</style>
</head>
<body>
  <header>
    <div class="brand">🧰 HTML Editor</div>
    <div class="toolbar">
      <button id="btn-new" title="Новый (очистить)">Новый</button>
      <label class="btn" for="file-open" title="Открыть .html">Открыть</label>
      <input id="file-open" type="file" accept=".html,.htm" hidden>
      <button id="btn-download" title="Скачать как .html">Скачать</button>
      <span class="sep"></span>
      <label class="btn">
        <input id="chk-live" type="checkbox" checked style="vertical-align: middle; margin-right: 6px;">
        Live предпросмотр
      </label>
      <button id="btn-run" class="ghost" title="Обновить предпросмотр">Обновить</button>
      <span class="sep"></span>
      <button id="btn-theme" title="Тема">Тема</button>
      <button id="btn-clear" class="ghost" title="Сбросить автосохранение">Сброс LS</button>
    </div>
  </header>

  <main class="split">
    <section class="col">
      <div class="tabs">
        <div class="tab active" data-tab="html">HTML</div>
        <div class="tab" data-tab="css">CSS</div>
        <div class="tab" data-tab="js">JS</div>
      </div>
      <div class="editors">
        <textarea id="ed-html" class="editor"></textarea>
        <textarea id="ed-css"  class="editor hidden"></textarea>
        <textarea id="ed-js"   class="editor hidden"></textarea>
      </div>
    </section>

    <section class="col">
      <div class="panel-title">Предпросмотр</div>
      <iframe id="preview" sandbox="allow-scripts allow-forms allow-pointer-lock allow-popups allow-modals"></iframe>
    </section>
  </main>

  <footer>
    <div class="muted">Автосохранение: localStorage. В браузере — без сервера.</div>
    <div class="muted" id="status"></div>
  </footer>

<script>
(() => {
  const els = {
    html: document.getElementById('ed-html'),
    css:  document.getElementById('ed-css'),
    js:   document.getElementById('ed-js'),
    tabs: document.querySelectorAll('.tab'),
    iframe: document.getElementById('preview'),
    live: document.getElementById('chk-live'),
    run: document.getElementById('btn-run'),
    theme: document.getElementById('btn-theme'),
    clear: document.getElementById('btn-clear'),
    open: document.getElementById('file-open'),
    download: document.getElementById('btn-download'),
    create: document.getElementById('btn-new'),
    status: document.getElementById('status'),
  };

  const STORAGE_KEY = 'my-html-editor-v1';
  const THEME_KEY = 'my-html-editor-theme';

  // Начальное содержимое
  const defaults = {
    html: `<!-- Привет! Пиши HTML здесь -->
<h1>Здравствуйте 👋</h1>
<p>Это мой мини-редактор на GitHub Pages.</p>
<button onclick="alert('Работает!')">Кнопка</button>`,
    css: `/* Стили сюда */
body { font-family: system-ui, sans-serif; padding: 24px; }
h1 { color: #2f6cf6; }`,
    js: `// JS здесь
console.log('Привет из редактора!');`
  };

  // Тема
  function setTheme(mode) {
    document.documentElement.setAttribute('data-theme', mode);
    localStorage.setItem(THEME_KEY, mode);
  }
  
  const savedTheme = localStorage.getItem(THEME_KEY) || 'dark';
  setTheme(savedTheme);
  
  function updateThemeButton(theme) {
    els.theme.textContent = theme === 'dark' ? '🌞 Светлая' : '🌙 Тёмная';
  }
  
  updateThemeButton(savedTheme);
  
  els.theme.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = cur === 'dark' ? 'light' : 'dark';
    setTheme(next);
    updateThemeButton(next);
  });

  // Вкладки
  let activeTab = 'html';
  els.tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      els.tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.tab;
      document.querySelectorAll('.editor').forEach(ed => ed.classList.add('hidden'));
      const editor = document.getElementById('ed-' + activeTab);
      editor.classList.remove('hidden');
      editor.focus();
    });
  });

  // Поддержка Tab в textarea
  [els.html, els.css, els.js].forEach(ed => {
    ed.addEventListener('keydown', (e) => {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = ed.selectionStart;
        const end = ed.selectionEnd;
        ed.value = ed.value.substring(0, start) + '  ' + ed.value.substring(end);
        ed.selectionStart = ed.selectionEnd = start + 2;
      }
    });
  });

  // Автосохранение
  function saveLS() {
    const payload = {
      html: els.html.value,
      css: els.css.value,
      js: els.js.value,
      ts: Date.now(),
    };
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      setStatus('✓ Сохранено');
    } catch (err) {
      console.error('Ошибка сохранения:', err);
      setStatus('⚠ Ошибка сохранения');
    }
  }
  function loadLS() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      const v = JSON.parse(raw);
      if (typeof v.html !== 'string') return false;
      els.html.value = v.html ?? '';
      els.css.value = v.css ?? '';
      els.js.value = v.js ?? '';
      return true;
    } catch (err) {
      console.error('Ошибка загрузки:', err);
      return false;
    }
  }

  // Статус
  let statusTimer = null;
  function setStatus(text) {
    els.status.textContent = text;
    els.status.style.opacity = '1';
    if (statusTimer) clearTimeout(statusTimer);
    statusTimer = setTimeout(() => {
      els.status.style.opacity = '0';
    }, 1800);
  }

  // Предпросмотр
  function buildDoc() {
    const html = els.html.value;
    const css = els.css.value;
    const js = els.js.value || '';
    const doc = `<!DOCTYPE html>
    // Правильное экранирование для предотвращения XSS и разрыва тегов
    const safeJs = js.replace(/</script>/gi, '<\/script>');
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview</title>
<style>${css}</style>
</head>
<body>
${html}
<script>${js}<\/script>
</body>
</html>`;
    return doc;
  }
  function render() {
    try {
      els.iframe.srcdoc = buildDoc();
      setStatus(els.live.checked ? '✓ Live обновлён' : '✓ Обновлено');
    } catch (err) {
      console.error('Ошибка рендера:', err);
      setStatus('⚠ Ошибка рендера');
    }
  }
  function debounce(fn, ms=300) {
    let t; return (...args) => { clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
  }
  const onChange = debounce(() => {
    saveLS();
    if (els.live.checked) render();
  }, 280);

  [els.html, els.css, els.js].forEach(ed => {
    ed.addEventListener('input', onChange);
  });
  els.run.addEventListener('click', () => render());

  // Файл: открыть
  els.open.addEventListener('change', async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const text = await file.text();
    try {
      // Пытаемся распарсить HTML и разложить по вкладкам
      const dom = new DOMParser().parseFromString(text, 'text/html');
      const styles = [...dom.querySelectorAll('style')].map(s => s.textContent).join('\n');
      const scripts = [...dom.querySelectorAll('script:not([src])')].map(s => s.textContent).join('\n');
      els.html.value = dom.body.innerHTML.trim() || text;
      els.css.value = styles;
      els.js.value = scripts;
    } catch {
      els.html.value = text;
    }
    saveLS();
    render();
    e.target.value = '';
  });

  // Скачать
  els.download.addEventListener('click', () => {
    try {
      const blob = new Blob([buildDoc()], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'index.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      setStatus('✓ Скачано');
    } catch (err) {
      console.error('Ошибка скачивания:', err);
      setStatus('⚠ Ошибка скачивания');
    }
  });

  // Новый
  els.create.addEventListener('click', () => {
    if (!confirm('Очистить редактор? Все несохранённые изменения будут потеряны.')) return;
    els.html.value = defaults.html;
    els.css.value = defaults.css;
    els.js.value = defaults.js;
    document.querySelector('[data-tab="html"]').click();
    saveLS();
    render();
    setStatus('✓ Создан новый проект');
  });

  // Сброс LS
  els.clear.addEventListener('click', () => {
    localStorage.removeItem(STORAGE_KEY);
    setStatus('✓ localStorage очищен');
  });

  // Горячие клавиши
  document.addEventListener('keydown', (e) => {
    // Ctrl/Cmd + S для сохранения
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      saveLS();
      render();
    }
    // Ctrl/Cmd + Enter для запуска
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      render();
    }
  });

  // Инициализация
  if (!loadLS()) {
    els.html.value = defaults.html;
    els.css.value  = defaults.css;
    els.js.value   = defaults.js;
  }
  
  // Переключаемся на активную вкладку
  document.querySelector(`[data-tab="${activeTab}"]`).click();
  
  render();
  setStatus('Готов к работе');
})();
</script>
</body>
</html>
