<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🛠 Онлайн HTML Редактор</title>
  <style>
    :root {
      --primary: #4f46e5;
      --bg: #f3f4f6;
      --white: #ffffff;
      --border: #d1d5db;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      background: var(--bg);
      color: #333;
    }

    header {
      background: var(--primary);
      color: white;
      padding: 20px;
      text-align: center;
    }

    .mode-switcher {
      text-align: center;
      padding: 10px;
      background: white;
      border-bottom: 1px solid var(--border);
    }

    .mode-switcher button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 16px;
      margin: 0 5px;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    .mode-switcher button:hover {
      background: #3730a3;
    }

    .container {
      display: flex;
      flex-direction: row;
      height: calc(100vh - 145px);
    }

    .editors, .preview {
      flex: 1;
      padding: 10px;
    }

    .editors {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    textarea {
      width: 100%;
      height: 100%;
      min-height: 100px;
      resize: vertical;
      font-family: monospace;
      font-size: 15px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
    }

    .preview {
      border-left: 2px solid var(--border);
      background: var(--white);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        height: auto;
      }

      .preview {
        border-left: none;
        border-top: 2px solid var(--border);
      }
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>🛠 Онлайн HTML/CSS/JS Редактор</h1>
    <p>Выбери режим и пиши код</p>
  </header>

  <div class="mode-switcher">
    <button onclick="setMode('html')">🔤 Только HTML</button>
    <button onclick="setMode('full')">🧩 HTML + CSS + JS</button>
  </div>

  <div class="container">
    <div class="editors">
      <textarea id="html" placeholder="HTML код"><h1>Привет, мир!</h1></textarea>
      <textarea id="css" placeholder="CSS код" class="full-input hidden">h1 { color: crimson; text-align: center; }</textarea>
      <textarea id="js" placeholder="JavaScript код" class="full-input hidden">console.log("Добро пожаловать!");</textarea>
    </div>
    <div class="preview">
      <iframe id="output"></iframe>
    </div>
  </div>

  <script>
    const htmlInput = document.getElementById("html");
    const cssInput = document.getElementById("css");
    const jsInput = document.getElementById("js");
    const output = document.getElementById("output");
    const fullInputs = document.querySelectorAll(".full-input");

    let mode = "html"; // или 'full'

    function updateOutput() {
      let html = htmlInput.value;
      let css = cssInput.value;
      let js = jsInput.value;

      let fullContent = "";

      if (mode === "html") {
        fullContent = html;
      } else {
        fullContent = `
          ${html}
          <style>${css}</style>
          <script>${js}<\/script>
        `;
      }

      output.srcdoc = fullContent;
    }

    htmlInput.addEventListener("input", updateOutput);
    cssInput.addEventListener("input", updateOutput);
    jsInput.addEventListener("input", updateOutput);

    // Переключение режима
    function setMode(newMode) {
      mode = newMode;
      if (mode === "html") {
        fullInputs.forEach(el => el.classList.add("hidden"));
      } else {
        fullInputs.forEach(el => el.classList.remove("hidden"));
      }
      updateOutput();
    }

    // Старт
    updateOutput();
  </script>

</body>
</html>
