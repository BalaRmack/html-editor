<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 Онлайн HTML Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #1c1f26;
      --panel: #2b2f3a;
      --text: #f8f8f2;
      --accent: #7c3aed;
      --border: #3c4048;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Fira Code', monospace;
    }

    header {
      background: var(--panel);
      padding: 15px 20px;
      font-size: 20px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      border-bottom: 1px solid var(--border);
    }

    .mode-switcher {
      background: var(--panel);
      text-align: center;
      padding: 10px;
      border-bottom: 1px solid var(--border);
    }

    .mode-switcher button {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 14px;
      margin: 0 5px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: 0.3s;
    }

    .mode-switcher button:hover {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .container {
      display: flex;
      height: calc(100vh - 124px);
    }

    .editors {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px;
      gap: 10px;
      overflow-y: auto;
      border-right: 2px solid var(--border);
      background: var(--bg);
    }

    .editor-block {
      display: flex;
      flex-direction: column;
    }

    .editor-label {
      font-size: 14px;
      color: #9ca3af;
      margin-bottom: 6px;
      padding-left: 6px;
    }

    textarea {
      width: 100%;
      height: 150px;
      resize: vertical;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      color: var(--text);
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      transition: 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .preview {
      flex: 1;
      background: #fff;
      overflow: hidden;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
      }

      .editors {
        border-right: none;
        border-bottom: 2px solid var(--border);
      }

      .preview {
        height: 300px;
      }
    }
  </style>
</head>
<body>

  <header>🔥 Онлайн HTML/CSS/JS Редактор</header>

  <div class="mode-switcher">
    <button onclick="setMode('html')">🔤 Только HTML</button>
    <button onclick="setMode('full')">🧩 HTML + CSS + JS</button>
  </div>

  <div class="container">
    <div class="editors">
      <div class="editor-block">
        <div class="editor-label">HTML</div>
        <textarea id="html"><h1>Привет, мир!</h1></textarea>
      </div>

      <div class="editor-block full-input hidden">
        <div class="editor-label">CSS</div>
        <textarea id="css">h1 { color: cyan; text-align: center; }</textarea>
      </div>

      <div class="editor-block full-input hidden">
        <div class="editor-label">JavaScript</div>
        <textarea id="js">console.log("Работает!"</textarea>
      </div>
    </div>

    <div class="preview">
      <iframe id="output"></iframe>
    </div>
  </div>

  <script>
    const htmlInput = document.getElementById("html");
    const cssInput = document.getElementById("css");
    const jsInput = document.getElementById("js");
    const output = document.getElementById("output");
    const fullInputs = document.querySelectorAll(".full-input");

    let mode = "html";

    function updatePreview() {
      let html = htmlInput.value;
      let css = cssInput.value;
      let js = jsInput.value;
      let content = "";

      if (mode === "html") {
        content = html;
      } else {
        content = `
          ${html}
          <style>${css}</style>
          <script>${js}<\/script>
        `;
      }

      output.srcdoc = content;
    }

    // Переключение режимов
    function setMode(newMode) {
      mode = newMode;

      if (mode === 'html') {
        fullInputs.forEach(el => el.classList.add('hidden'));
      } else {
        fullInputs.forEach(el => el.classList.remove('hidden'));
      }

      updatePreview();
    }

    // Обновляем на ввод
    htmlInput.addEventListener('input', updatePreview);
    cssInput.addEventListener('input', updatePreview);
    jsInput.addEventListener('input', updatePreview);

    // Инициализация
    updatePreview();
  </script>
</body>
</html>
